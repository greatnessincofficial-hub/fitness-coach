<body>
<header>
  <h1>AI Fitness Coach</h1>
  <span>Powered by AI</span>
</header>
<nav>
  <button class="active" onclick="showPage('workout', this)">Workout Plan</button>
  <button onclick="showPage('bmi', this)">BMI Calculator</button>
  <button onclick="showPage('timer', this)">Workout Timer</button>
  <button onclick="showPage('watch', this)">Log Activity</button>
  <button onclick="showPage('logs', this)">My Logs</button>
</nav>
<div id="page-workout" class="page active">
  <div class="card">
    <h2>Get your AI workout plan</h2>
    <label>Your goal</label>
    <select id="goal">
      <option value="six pack abs">Six pack abs</option>
      <option value="lose weight">Lose weight</option>
      <option value="build chest muscles">Build chest</option>
      <option value="build arm muscles">Build arms</option>
      <option value="build leg muscles">Build legs</option>
      <option value="build back muscles">Build back</option>
      <option value="custom weight loss plan">Custom weight loss plan</option>
      <option value="custom weight gain plan">Custom weight gain plan</option>
    </select>
    <label>Age</label>
    <input type="number" id="age" placeholder="e.g. 14" />
    <label>Weight (kg)</label>
    <input type="number" id="weight" placeholder="e.g. 66" />
    <label>Height (cm)</label>
    <input type="number" id="height" placeholder="e.g. 175" />
    <label>Fitness level</label>
    <select id="level">
      <option value="complete beginner">Complete beginner</option>
      <option value="intermediate">Intermediate</option>
      <option value="advanced">Advanced</option>
    </select>
    <button class="btn" onclick="askCoach()">Get my plan!</button>
    <div class="ai-response" id="ai-response"></div>
  </div>
</div>
<div id="page-bmi" class="page">
  <div class="card">
    <h2>BMI Calculator</h2>
    <label>Weight (kg)</label>
    <input type="number" id="bmi-weight" placeholder="e.g. 66" />
    <label>Height (cm)</label>
    <input type="number" id="bmi-height" placeholder="e.g. 175" />
    <button class="btn" onclick="calcBMI()">Calculate BMI</button>
    <div class="bmi-result" id="bmi-result" style="display:none">
      <div class="bmi-number" id="bmi-number"></div>
      <div class="bmi-category" id="bmi-category"></div>
      <div class="bmi-bar"><div class="bmi-marker" id="bmi-marker"></div></div>
      <div id="bmi-advice" style="color:#aaa; font-size:14px; margin-top:8px;"></div>
    </div>
  </div>
</div>
<div id="page-timer" class="page">
  <div class="card">
    <h2>Workout Timer</h2>
    <label>Set time (seconds)</label>
    <input type="number" id="timer-input" placeholder="e.g. 60" value="60" />
    <div class="timer-display">
      <div class="timer-number" id="timer-display">01:00</div>
    </div>
    <div class="timer-btns">
      <button class="btn" onclick="startTimer()">Start</button>
      <button class="btn btn-outline" onclick="pauseTimer()">Pause</button>
      <button class="btn btn-red" onclick="resetTimer()">Reset</button>
    </div>
  </div>
</div>
<div id="page-watch" class="page">
  <div class="card">
    <h2>Log your activity</h2>
    <p style="color:#888; font-size:13px; margin-bottom:16px;">Check your watch or phone and enter today's stats below.</p>
    <div class="watch-grid">
      <div><label>Exercise type</label><input type="text" id="exercise" placeholder="e.g. Running" /></div>
      <div><label>Duration (mins)</label><input type="number" id="duration" placeholder="e.g. 30" /></div>
      <div><label>Calories burned</label><input type="number" id="calories" placeholder="e.g. 250" /></div>
      <div><label>Steps</label><input type="number" id="steps" placeholder="e.g. 8000" /></div>
      <div><label>Heart rate (avg bpm)</label><input type="number" id="heartrate" placeholder="e.g. 140" /></div>
      <div><label>Distance (km)</label><input type="number" id="distance" placeholder="e.g. 3.5" /></div>
    </div>
    <button class="btn" onclick="logActivity()">Log it!</button>
    <div id="log-status"></div>
  </div>
</div>
<div id="page-logs" class="page">
  <div class="stat-grid" id="stats-grid"></div>
  <div class="card">
    <h2>Activity history</h2>
    <button class="btn btn-outline" onclick="viewLogs()" style="width:auto; padding:8px 20px; margin-bottom:16px;">Refresh logs</button>
    <div id="logs-display"></div>
  </div>
</div>
<script>
  function showPage(name, btn) {
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('page-' + name).classList.add('active');
    btn.classList.add('active');
    if (name === 'logs') viewLogs();
  }
  async function askCoach() {
    var goal = document.getElementById('goal').value;
    var age = document.getElementById('age').value;
    var weight = document.getElementById('weight').value;
    var height = document.getElementById('height').value;
    var level = document.getElementById('level').value;
    var details = 'Age: ' + age + ', Weight: ' + weight + 'kg, Height: ' + height + 'cm, Level: ' + level;
    var box = document.getElementById('ai-response');
    box.style.display = 'block';
    box.innerHTML = '<span class="loading">Your AI coach is thinking...</span>';
    var res = await fetch('/ask', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({goal: goal, details: details})
    });
    var data = await res.json();
    box.textContent = data.response;
  }
  function calcBMI() {
    var weight = parseFloat(document.getElementById('bmi-weight').value);
    var height = parseFloat(document.getElementById('bmi-height').value) / 100;
    if (!weight || !height) return;
    var bmi = (weight / (height * height)).toFixed(1);
    var category, color, advice;
    if (bmi < 18.5) { category = 'Underweight'; color = '#74b9ff'; advice = 'Consider a weight gain plan and consult a doctor.'; }
    else if (bmi < 25) { category = 'Healthy weight'; color = '#00d4aa'; advice = 'Great! Keep up your healthy lifestyle.'; }
    else if (bmi < 30) { category = 'Overweight'; color = '#fdcb6e'; advice = 'A weight loss plan and regular exercise can help.'; }
    else { category = 'Obese'; color = '#e17055'; advice = 'Please consult a doctor and consider a structured plan.'; }
    document.getElementById('bmi-number').textContent = bmi;
    document.getElementById('bmi-number').style.color = color;
    document.getElementById('bmi-category').textContent = category;
    document.getElementById('bmi-category').style.color = color;
    document.getElementById('bmi-advice').textContent = advice;
    var pct = Math.min(Math.max((bmi - 15) / 25 * 100, 0), 100);
    document.getElementById('bmi-marker').style.left = pct + '%';
    document.getElementById('bmi-result').style.display = 'block';
  }
  var timerInterval, timerSeconds, timerRunning = false;
  function updateTimerDisplay(s) {
    var m = Math.floor(s / 60).toString().padStart(2, '0');
    var sec = (s % 60).toString().padStart(2, '0');
    document.getElementById('timer-display').textContent = m + ':' + sec;
  }
  function startTimer() {
    if (timerRunning) return;
    if (!timerSeconds) timerSeconds = parseInt(document.getElementById('timer-input').value);
    timerRunning = true;
    timerInterval = setInterval(function() {
      timerSeconds--;
      updateTimerDisplay(timerSeconds);
      if (timerSeconds <= 0) { clearInterval(timerInterval); timerRunning = false; document.getElementById('timer-display').textContent = 'Done!'; }
    }, 1000);
  }
  function pauseTimer() { clearInterval(timerInterval); timerRunning = false; }
  function resetTimer() {
    clearInterval(timerInterval); timerRunning = false; timerSeconds = null;
    updateTimerDisplay(parseInt(document.getElementById('timer-input').value) || 0);
  }
  document.getElementById('timer-input').addEventListener('input', function() {
    if (!timerRunning) { timerSeconds = null; updateTimerDisplay(parseInt(this.value) || 0); }
  });
  async function logActivity() {
    var entry = {
      exercise: document.getElementById('exercise').value,
      duration: document.getElementById('duration').value,
      calories: document.getElementById('calories').value,
      steps: document.getElementById('steps').value,
      heartrate: document.getElementById('heartrate').value,
      distance: document.getElementById('distance').value
    };
    await fetch('/log', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(entry)
    });
    document.getElementById('log-status').innerHTML = '<p class="success">Logged! Great work today!</p>';
    ['exercise','duration','calories','steps','heartrate','distance'].forEach(function(id) { document.getElementById(id).value = ''; });
  }
  async function viewLogs() {
    var res = await fetch('/logs');
    var logs = await res.json();
    var display = document.getElementById('logs-display');
    if (logs.length === 0) { display.innerHTML = '<p style="color:#888">No activities logged yet. Get moving!</p>'; return; }
    var totalCal = logs.reduce(function(s, l) { return s + (parseInt(l.calories) || 0); }, 0);
    var totalMin = logs.reduce(function(s, l) { return s + (parseInt(l.duration) || 0); }, 0);
    var totalSteps = logs.reduce(function(s, l) { return s + (parseInt(l.steps) || 0); }, 0);
    document.getElementById('stats-grid').innerHTML =
      '<div class="stat-card"><div class="value">' + logs.length + '</div><div class="label">Workouts logged</div></div>' +
      '<div class="stat-card"><div class="value">' + totalCal.toLocaleString() + '</div><div class="label">Total calories</div></div>' +
      '<div class="stat-card"><div class="value">' + totalMin + '</div><div class="label">Total minutes</div></div>' +
      '<div class="stat-card"><div class="value">' + totalSteps.toLocaleString() + '</div><div class="label">Total steps</div></div>';
    display.innerHTML = logs.slice().reverse().map(function(l) {
      return '<div class="log-entry"><div class="date">' + l.date + '</div><strong>' + (l.exercise || 'Activity') + '</strong> — ' + (l.duration || 0) + ' mins · ' + (l.calories || 0) + ' cal · ' + (l.steps || 0) + ' steps</div>';
    }).join('');
  }
</script>
</body>
</html>
